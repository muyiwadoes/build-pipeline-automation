name: CI Pipeline

on:
  push:
    branches: [main, check]
  pull_request:
    branches: [main]

jobs:

  # -----------------------
  # LINT STAGE
  # -----------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install ruff

      - run: ruff check . --line-length 120


  # -----------------------
  # BUILD STAGE
  # -----------------------
  build:
    name: Build and Save Image
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t build-pipeline-automation:${{ github.sha }} .

      - name: Save image
        run: docker save build-pipeline-automation:${{ github.sha }} | gzip > image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz


  # -----------------------
  # SECURITY SCAN STAGE
  # -----------------------
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed build-pipeline-automation:${{ github.sha }}


  # -----------------------
  # PUSH + DEPLOY STAGE
  # -----------------------
  push:
    name: Push to ECR, Docker Hub and Deploy to ECS
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load < image.tar.gz


      # -----------------------
      # AWS AUTH
      # -----------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      # -----------------------
      # ECR LOGIN
      # -----------------------
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      # -----------------------
      # TAG + PUSH TO ECR
      # -----------------------
      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker tag build-pipeline-automation:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}


      # -----------------------
      # DOCKER HUB PUSH
      # -----------------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and push to Docker Hub
        run: |
          docker tag build-pipeline-automation:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/build-pipeline-automation:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/build-pipeline-automation:${{ github.sha }}


      # -----------------------
      # ECS TASK UPDATE
      # -----------------------
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition build-pipeline_task_definition \
            --query taskDefinition \
            --output json | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > task-definition.json


      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: "build-pipeline-container"
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}


      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: build-pipeline-automation_service
          cluster: build-pipeline_cluster
          wait-for-service-stability: true
          force-new-deployment: true


      # -----------------------
      # ECS STATUS CHECK
      # -----------------------
      - name: Check service status
        if: always()
        run: |
          aws ecs describe-services \
            --cluster build-pipeline_cluster \
            --services build-pipeline-automation_service \
            --query "services[0].{status:status, runningCount:runningCount, pendingCount:pendingCount, desiredCount:desiredCount}" \
            --output yaml