name: CI Pipeline

on:
  push:
    branches: [main, check]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: execute-tech-academy
  AWS_REGION: eu-north-1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8

      - run: flake8 app.py --max-line-length=120

  build:
    name: Build Image (Deterministic)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Save image
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} | gzip > image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Critical vulnerability gate
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            $IMAGE_NAME:${{ github.sha }}

  push:
    name: Push + Validate + Deploy
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/check'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load < image.tar.gz

      # ---------------- SECRET VALIDATION (FAIL FAST) ----------------
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"     || (echo "Missing AWS_ACCESS_KEY_ID" && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "Missing AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"    || (echo "Missing DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"       || (echo "Missing DOCKERHUB_TOKEN" && exit 1)
          test -n "${{ secrets.ECR_REPOSITORY }}"        || (echo "Missing ECR_REPOSITORY" && exit 1)

      # ---------------- AWS AUTH ----------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------- ECR LOGIN ----------------
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR (immutable tag = SHA)
        id: ecr_push
        run: |
          ECR_IMAGE=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $ECR_IMAGE
          docker push $ECR_IMAGE
          echo "ECR_IMAGE=$ECR_IMAGE" >> $GITHUB_ENV

      # ---------------- DOCKER HUB LOGIN ----------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub (same SHA tag)
        id: dockerhub_push
        run: |
          DH_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $DH_IMAGE
          docker push $DH_IMAGE
          echo "DH_IMAGE=$DH_IMAGE" >> $GITHUB_ENV

      # ---------------- ECS DEPLOY ----------------
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition build-pipeline_task_definition \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render ECS task definition
        id: task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: build-pipeline-container
          image: ${{ env.ECR_IMAGE }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task.outputs.task-definition }}
          service: build-pipeline-automation_service
          cluster: build-pipeline_cluster
          wait-for-service-stability: true

      # ---------------- POST DEPLOY VERIFICATION ----------------
      - name: Verify deployment state
        if: always()
        run: |
          aws ecs describe-services \
            --cluster build-pipeline_cluster \
            --services build-pipeline-automation_service \
            --query "services[0].{running:runningCount,desired:desiredCount,status:status}" \
            --output table